<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO: keyword-first title and improved meta description -->
    <title>Website Design for Service Businesses | LUMIO Coordia Intelligence</title>
    <meta name="description" content="Professional website design for service businesses. LUMIO builds clear, conversion-focused websites that help clients understand your offer and take the next step." />

    <!-- Canonical -->
    <link rel="canonical" href="https://lumio-coordia-intelligence.pages.dev/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Website Design for Service Businesses | LUMIO Coordia Intelligence" />
    <meta property="og:description" content="Clear, practical websites built around your offer, your proof, and your next enquiry." />
    <meta property="og:url" content="https://lumio-coordia-intelligence.pages.dev/" />
    <meta property="og:image" content="https://lumio-coordia-intelligence.pages.dev/assets/og-image.jpg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Website Design for Service Businesses | LUMIO Coordia Intelligence" />
    <meta name="twitter:description" content="Clear, practical websites built around your offer, your proof, and your next enquiry." />
    <meta name="twitter:image" content="https://lumio-coordia-intelligence.pages.dev/assets/og-image.jpg" />

    <!-- JSON-LD Organization schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "LUMIO Coordia Intelligence",
      "url": "https://lumio-coordia-intelligence.pages.dev",
      "logo": "https://lumio-coordia-intelligence.pages.dev/assets/lumio-logo-lockup.png",
      "description": "Clear, practical websites built around your offer, your proof, and your next enquiry.",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "sales",
        "availableLanguage": ["English", "Chinese", "Japanese", "Korean"]
      }
    }
    </script>

    <!-- Typography: DM Serif Display + DM Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">

    <!-- Performance: preconnect to CloudFront CDN serving the hero video -->
    <link rel="preconnect" href="https://d8j0ntlcm91z4.cloudfront.net" />

    <!-- Performance: modulepreload for JS bundle -->
    <link rel="modulepreload" href="/assets/index-lumio-brand-v1.js" />

    <script type="module" crossorigin src="/assets/index-lumio-brand-v1.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-lumio-brand-v1.css">
  </head>
  <body>
    <!-- Accessibility: skip navigation link -->
    <a href="#home" style="position:absolute;top:-9999px;left:0;z-index:9999;padding:8px 16px;background:#111;color:#fff;font-size:14px;text-decoration:none;border-radius:0 0 4px 0" onfocus="this.style.top='0'" onblur="this.style.top='-9999px'">Skip to main content</a>

    <div id="root"></div>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) entry.target.classList.add('is-visible');
        });
      }, { threshold: 0.12 });
      document.querySelectorAll(
        '.proof-card, .process-row, .product-card'
      ).forEach(function(el, i) {
        el.style.opacity = '0';
        el.style.transform = 'translateY(24px)';
        el.style.transition = 'opacity 0.6s ease ' + (i * 0.08) + 's, transform 0.6s ease ' + (i * 0.08) + 's';
        observer.observe(el);
      });
    });
    </script>
  </body>
</html>
